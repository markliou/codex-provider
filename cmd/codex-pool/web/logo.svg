<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Balanced sticky routes">
  <defs>
    <linearGradient id="bg" x1="58" y1="48" x2="454" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#302440"/>
      <stop offset=".5" stop-color="#1b1526"/>
      <stop offset="1" stop-color="#0f0b16"/>
    </linearGradient>
    <linearGradient id="trunk" x1="104" y1="256" x2="267" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8cc8ff"/>
      <stop offset="1" stop-color="#f8f5ff"/>
    </linearGradient>
    <linearGradient id="upper" x1="250" y1="250" x2="410" y2="134" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8f5ff"/>
      <stop offset="1" stop-color="#54d6b0"/>
    </linearGradient>
    <linearGradient id="middle" x1="250" y1="256" x2="410" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8f5ff"/>
      <stop offset="1" stop-color="#8cc8ff"/>
    </linearGradient>
    <linearGradient id="lower" x1="250" y1="262" x2="410" y2="378" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8f5ff"/>
      <stop offset="1" stop-color="#ff8a6b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#08050c" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="108" cy="256" r="42" fill="#171020" stroke="#8cc8ff" stroke-width="18" filter="url(#glow)"/>
  <path d="M150 256H226" fill="none" stroke="url(#trunk)" stroke-width="30" stroke-linecap="round"/>

  <!-- The central ring is the sticky route anchor: one session enters once,
       then remains attached to one healthy account branch. -->
  <circle cx="256" cy="256" r="45" fill="#171020" stroke="#f8f5ff" stroke-width="20" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="13" fill="#c6e66a"/>

  <path d="M294 236C326 218 338 157 378 143" fill="none" stroke="url(#upper)" stroke-width="28" stroke-linecap="round"/>
  <path d="M301 256H378" fill="none" stroke="url(#middle)" stroke-width="28" stroke-linecap="round"/>
  <path d="M294 276C326 294 338 355 378 369" fill="none" stroke="url(#lower)" stroke-width="28" stroke-linecap="round"/>

  <circle cx="404" cy="132" r="34" fill="#171020" stroke="#54d6b0" stroke-width="17"/>
  <circle cx="404" cy="256" r="34" fill="#171020" stroke="#8cc8ff" stroke-width="17"/>
  <circle cx="404" cy="380" r="34" fill="#171020" stroke="#ff8a6b" stroke-width="17"/>
</svg>
